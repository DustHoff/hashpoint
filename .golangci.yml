version: "2"

run:
  timeout: 5m
  go: "1.22"
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
    - gocritic
    - errorlint
    - ineffassign
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      # Idiomatic close-on-read-path: the iteration error surfaces via
      # rows.Err() and the body has nothing actionable to recover. Per-call
      # `_ = X.Close()` adds noise without buying safety. We match by the
      # resolved interface (io.Closer / io.ReadCloser) so chained accesses
      # like `resp.Body.Close()` are covered too.
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*database/sql.Rows).Close
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
    gosec:
      excludes:
        - G104
  exclusions:
    paths:
      # npm ships transitive Go sources (e.g. flatted/golang/) under
      # node_modules/; they are not ours to lint.
      - frontend/node_modules
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: internal/winapi/
        linters:
          - gosec
          - revive

formatters:
  enable:
    - gofmt
    - goimports
