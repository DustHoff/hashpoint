version: "2"

run:
  timeout: 5m
  go: "1.22"
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
    - gocritic
    - errorlint
    - ineffassign
    - unused
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
    gosec:
      excludes:
        - G104
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: internal/winapi/
        linters:
          - gosec
          - revive

formatters:
  enable:
    - gofmt
    - goimports
