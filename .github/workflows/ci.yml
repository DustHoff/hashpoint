name: ci

on:
  pull_request:
    branches: ["**"]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend install
        working-directory: frontend
        run: npm ci || npm install

      - name: Frontend build
        # Populate frontend/dist so the //go:embed all:frontend/dist in
        # frontend.go resolves during golangci-lint's typecheck pass.
        working-directory: frontend
        run: npm run build

      - name: golangci-lint
        # v8 requires golangci-lint v2.x (v1.x dropped Go 1.26 export-data
        # support and is end-of-life). Pinned to `latest` until a v2 baseline
        # is established; tighten the pin if a release breaks the build.
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck --if-present

  test:
    name: test
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend install
        working-directory: frontend
        run: npm ci || npm install

      - name: Frontend build
        # Populate frontend/dist so the //go:embed all:frontend/dist in
        # frontend.go resolves before `go test ./...` builds the root pkg.
        working-directory: frontend
        run: npm run build

      - name: Unit tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Integration tests
        run: go test -tags=integration ./test/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: build
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@v0.3.3

      - name: Frontend install
        working-directory: frontend
        run: npm ci || npm install

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Generate Windows resource (.syso)
        shell: bash
        run: |
          go-winres make \
            --in winres/winres.json \
            --arch amd64 \
            --out cmd/timetracker/hashpoint

      - name: Build Go binary with embedded resources
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p build/bin
          # Mirror release.yml: same reproducibility flags + .syso embed,
          # only without the version metadata X-flags.
          go build -trimpath -tags desktop,production \
            -ldflags "-s -w -buildid= -H windowsgui" \
            -o build/bin/hashpoint.exe ./cmd/timetracker

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: hashpoint-pr-${{ github.run_id }}
          path: build/bin/hashpoint.exe
          retention-days: 7
