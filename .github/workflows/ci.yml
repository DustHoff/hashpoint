name: ci

on:
  pull_request:
    branches: ["**"]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --timeout=5m

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend install
        working-directory: frontend
        run: npm ci || npm install

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck --if-present

  test:
    name: test
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Integration tests
        run: go test -tags=integration ./test/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: build
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      - name: Frontend install
        working-directory: frontend
        run: npm ci || npm install

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Build with Wails (embed icon, manifest, VERSIONINFO)
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          # Mirror release.yml: wails build embeds PE resources (icon, manifest,
          # VERSIONINFO) via .syso so PR binaries match the release shape.
          wails build \
            -platform windows/amd64 \
            -s \
            -trimpath \
            -tags desktop,production \
            -ldflags "-s -w -buildid="

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: hashpoint-pr-${{ github.run_id }}
          path: build/bin/hashpoint.exe
          retention-days: 7
