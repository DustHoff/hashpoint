name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-tag:
    name: bump-tag
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') && !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: main

  build-release:
    name: build-release
    needs: bump-tag
    if: ${{ needs.bump-tag.outputs.new_tag != '' }}
    runs-on: windows-2022
    outputs:
      tag: ${{ needs.bump-tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-tag.outputs.new_tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend install
        working-directory: frontend
        run: npm ci || npm install

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Build Go binary with embedded version
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p build/bin
          go build -trimpath -tags desktop,production \
            -ldflags "-s -w -H windowsgui -X main.version=${{ needs.bump-tag.outputs.new_tag }} -X main.commit=${{ github.sha }} -X main.buildDate=${DATE}" \
            -o build/bin/hashpoint.exe ./cmd/timetracker

      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 build\bin\hashpoint.exe | ForEach-Object {
            "$($_.Hash.ToLower())  hashpoint.exe"
          } | Set-Content build\bin\checksums.txt

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: |
            build/bin/hashpoint.exe
            build/bin/checksums.txt
          retention-days: 14

  publish:
    name: publish
    needs: [bump-tag, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-build
          path: dist

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-tag.outputs.new_tag }}
          generate_release_notes: true
          files: |
            dist/hashpoint.exe
            dist/checksums.txt
