name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-tag:
    name: bump-tag
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') && !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: main

  build-release:
    name: build-release
    needs: bump-tag
    if: ${{ needs.bump-tag.outputs.new_tag != '' }}
    runs-on: windows-2022
    outputs:
      tag: ${{ needs.bump-tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-tag.outputs.new_tag }}

      # Pinned toolchain versions — re-runs of the same tag must produce a
      # byte-identical hashpoint.exe so SmartScreen reputation accumulates on
      # a single hash instead of resetting every release. Bump explicitly when
      # upgrading; do not move to floating versions.
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.2
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Install go-winres
        # Generates the .syso resource object that the Go linker picks up
        # automatically, embedding icon, manifest, and VERSIONINFO into
        # hashpoint.exe. Pinned for build reproducibility.
        run: go install github.com/tc-hib/go-winres@v0.3.3

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Resolve deterministic build date
        id: builddate
        shell: bash
        run: |
          # Use the tag commit's committer date so the embedded buildDate is a
          # function of source state, not wall-clock time.
          ISO=$(git show -s --format=%cI "${{ github.sha }}")
          EPOCH=$(git show -s --format=%ct "${{ github.sha }}")
          echo "iso=${ISO}" >> "$GITHUB_OUTPUT"
          echo "epoch=${EPOCH}" >> "$GITHUB_OUTPUT"

      - name: Sync winres.json identity.version with tag
        # go-winres' --product-version / --file-version flags only override
        # RT_VERSION; the Side-by-Side assembly identity under
        # RT_MANIFEST.identity.version stays at whatever the JSON committed
        # in the repo says. Patch it here so hashpoint.exe carries a single
        # coherent version across both resource tables (Windows uses
        # identity.version for SxS resolution and the App User Model ID).
        shell: pwsh
        run: |
          $tag = "${{ needs.bump-tag.outputs.new_tag }}".TrimStart("v")
          if ($tag -notmatch '^\d+(\.\d+){0,3}$') {
            Write-Error "Tag '$tag' is not a 1-4 part numeric version"
            exit 1
          }
          # Windows manifest assembly-identity requires exactly 4 parts
          # (major.minor.build.revision); github-tag-action yields N.N.N
          # so we pad the revision with zero.
          $parts = $tag.Split(".")
          while ($parts.Length -lt 4) { $parts += "0" }
          $fullVersion = $parts -join "."
          $jsonPath = "winres/winres.json"
          $j = Get-Content $jsonPath -Raw | ConvertFrom-Json
          $j.RT_MANIFEST."#1"."0409".identity.version = $fullVersion
          # Default Depth=2 would flatten the nested manifest tree to
          # strings; 32 is comfortably above the file's actual depth.
          ($j | ConvertTo-Json -Depth 32) | Set-Content -Path $jsonPath -Encoding utf8NoBOM
          Write-Host "Patched winres.json identity.version → $fullVersion"

      - name: Generate Windows resource (.syso)
        shell: bash
        run: |
          # Reads winres/winres.json (icon, manifest, VERSIONINFO config),
          # writes cmd/timetracker/hashpoint_windows_amd64.syso. The Go linker
          # picks the .syso up automatically when building ./cmd/timetracker.
          # tc-hib/winres writes TimeDateStamp=0 unconditionally → deterministic.
          go-winres make \
            --in winres/winres.json \
            --arch amd64 \
            --out cmd/timetracker/hashpoint \
            --product-version "${{ needs.bump-tag.outputs.new_tag }}" \
            --file-version "${{ needs.bump-tag.outputs.new_tag }}"

      - name: Build Go binary with embedded resources
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
          # Generic reproducible-build hint; go-winres writes
          # TimeDateStamp=0 unconditionally and does not read this, but we
          # set it for any other tooling that might join the chain.
          SOURCE_DATE_EPOCH: ${{ steps.builddate.outputs.epoch }}
        run: |
          mkdir -p build/bin
          # Reproducibility flags:
          #   -trimpath     strip absolute filesystem paths
          #   -buildid=     drop randomised PE BuildID
          #   -s -w         strip symbol/debug tables
          #   -H windowsgui no console window for GUI app
          # Combined with pinned toolchain + commit-derived buildDate +
          # deterministic .syso, two runs of this tag produce the same SHA-256.
          go build -trimpath -tags desktop,production \
            -ldflags "-s -w -buildid= -H windowsgui -X main.version=${{ needs.bump-tag.outputs.new_tag }} -X main.commit=${{ github.sha }} -X main.buildDate=${{ steps.builddate.outputs.iso }}" \
            -o build/bin/hashpoint.exe ./cmd/timetracker

      - name: Locate WiX Toolset 3
        # The `windows-2022` runner image ships a recent WiX 3.14.x. Use it
        # if present (pinning a specific patch via Chocolatey would be a
        # downgrade and fail). Fall back to a Chocolatey install on images
        # that drop WiX in the future. The script is idempotent so the
        # workflow keeps working across image rotations.
        shell: pwsh
        run: |
          function Find-WixBin {
            if ($env:WIX) {
              $p = Join-Path $env:WIX "bin"
              if (Test-Path (Join-Path $p "candle.exe")) { return $p }
            }
            $candidates = Get-ChildItem -Directory "C:\Program Files (x86)" `
              -Filter "WiX Toolset v3*" -ErrorAction SilentlyContinue
            foreach ($c in $candidates) {
              $p = Join-Path $c.FullName "bin"
              if (Test-Path (Join-Path $p "candle.exe")) { return $p }
            }
            return $null
          }
          $wixBin = Find-WixBin
          if (-not $wixBin) {
            choco install -y wixtoolset --no-progress
            $wixBin = Find-WixBin
          }
          if (-not $wixBin) {
            Write-Error "WiX 3 candle.exe not found after install attempt."
            exit 1
          }
          Write-Host "Using WiX bin at $wixBin"
          "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Download bundled hashpoint-plugin-manager
        # Pulls the latest hashpoint-plugin-manager release asset for
        # windows/amd64 and extracts it into build/bin/plugins-seed/. The
        # zip already contains a top-level "plugin-manager/" directory
        # holding plugin-manager.exe + manifest.toml — Expand-Archive lays
        # those out at the path the WiX -d switches expect.
        #
        # Rationale: the MSI cannot write to %APPDATA% reliably (admin /
        # SYSTEM context), so the plugin is shipped as a seed under
        # INSTALLDIR\plugins-seed\ and hashpoint copies it into the
        # per-user PluginsDir on first launch.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $seedRoot = "build/bin/plugins-seed"
          New-Item -ItemType Directory -Force $seedRoot | Out-Null
          $tmpZip = Join-Path $env:RUNNER_TEMP "plugin-manager.zip"
          gh release download --repo DustHoff/hashpoint-plugin-manager `
            --pattern "plugin-manager_*_windows_amd64.zip" `
            --output $tmpZip --clobber
          Expand-Archive -Path $tmpZip -DestinationPath $seedRoot -Force
          Remove-Item $tmpZip
          $exe = "$seedRoot/plugin-manager/plugin-manager.exe"
          $manifest = "$seedRoot/plugin-manager/manifest.toml"
          if (-not (Test-Path $exe)) {
            Write-Error "plugin-manager.exe nicht im Release-Asset gefunden"
            exit 1
          }
          if (-not (Test-Path $manifest)) {
            Write-Error "manifest.toml nicht im Release-Asset gefunden"
            exit 1
          }
          Write-Host "Plugin-Manager seed bereit:"
          Get-ChildItem -Recurse $seedRoot | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Resolve MSI ProductVersion
        # WiX requires a numeric major.minor.build (1-3 numeric parts);
        # github-tag-action produces tags like "v0.4.2" — strip the "v"
        # and reject any pre-release suffix that WiX cannot parse.
        id: msiversion
        shell: bash
        run: |
          v="${{ needs.bump-tag.outputs.new_tag }}"
          v="${v#v}"
          if [[ ! "$v" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]]; then
            echo "::error::Tag '$v' is not WiX-compatible (need N[.N[.N[.N]]])"
            exit 1
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - name: Build MSI installer
        # candle compiles the .wxs to .wixobj; light links it into the .msi.
        # File source paths are passed via -d so the .wxs stays repo-relative.
        shell: pwsh
        run: |
          $version = "${{ steps.msiversion.outputs.version }}"
          $msiPath = "build/bin/hashpoint-$version.msi"
          # WixUtilExtension provides <util:CloseApplication> (kills any
          # running hashpoint.exe before file staging) — both candle and
          # light need it referenced via -ext.
          candle.exe -nologo `
            -arch x64 `
            -ext WixUtilExtension `
            -dProductVersion="$version" `
            -dExeFile="build/bin/hashpoint.exe" `
            -dIconFile="build/windows/icon.ico" `
            -dSeedPluginManagerExe="build/bin/plugins-seed/plugin-manager/plugin-manager.exe" `
            -dSeedPluginManagerManifest="build/bin/plugins-seed/plugin-manager/manifest.toml" `
            -out "build/bin/hashpoint.wixobj" `
            "build/wix/hashpoint.wxs"
          # ICE57 warns about HKCU registry inside a per-machine install
          # (the autostart component); we accept that trade-off for
          # convenience of "autostart pre-set for the installing user".
          light.exe -nologo `
            -spdb `
            -ext WixUtilExtension `
            -sice:ICE57 `
            -out $msiPath `
            "build/bin/hashpoint.wixobj"
          if (-not (Test-Path $msiPath)) {
            Write-Error "MSI build failed: $msiPath not produced"
            exit 1
          }
          Remove-Item "build/bin/hashpoint.wixobj"
          "MSI_PATH=$msiPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MSI_NAME=hashpoint-$version.msi" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          $files = @("hashpoint.exe", "$env:MSI_NAME")
          $lines = foreach ($f in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 "build/bin/$f").Hash.ToLower()
            "$hash  $f"
          }
          $lines | Set-Content build/bin/checksums.txt

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: |
            build/bin/hashpoint.exe
            build/bin/hashpoint-*.msi
            build/bin/checksums.txt
          retention-days: 14

  publish:
    name: publish
    needs: [bump-tag, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-build
          path: dist

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-tag.outputs.new_tag }}
          generate_release_notes: true
          files: |
            dist/hashpoint.exe
            dist/hashpoint-*.msi
            dist/checksums.txt
